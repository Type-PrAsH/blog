<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: hsl(228, 45%, 44%);
      }
    </style>
  </head>
  <body>
    <div id="container">
      <div id="box">
        <img id="illustration" src="./assets/images/illustration.svg" />
        <h4>Learning</h4>
        <p id="published">Published 21 Dec 2023</p>
        <h1 id="html">HTML & CSS Foundations</h1>
        <p id="para">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
        <div id="about">
          <img id="avatar" src="./assets/images/avatar.webp" />
          <p id="name">Greg Hooper</p>
        </div>
      </div>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a rel="noopener noreferrer" target="_blank" href="https://www.linkedin.com/in/prashforwork/">Prashant</a>.
    </footer>
  </body>
</html>
